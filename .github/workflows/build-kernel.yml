name: Build Kernel
on:
  watch:
    types: [started]

  workflow_dispatch:

jobs:
  build:
    name: Build Kernel by ${{ github.actor }}
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
    steps:
    - uses: actions/checkout@v4

    - name: Prepare Configuration
      run: |
        CONFIG_ENV=$(cat config.env | grep -w "CONFIG_ENV" | head -n 1 | cut -d "=" -f 2)
        echo "KERNEL_SOURCE=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_SOURCE_BRANCH=$(cat $CONFIG_ENV | grep -w "KERNEL_SOURCE_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_CONFIG=$(cat $CONFIG_ENV | grep -w "KERNEL_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNEL_IMAGE_NAME=$(cat $CONFIG_ENV | grep -w "KERNEL_IMAGE_NAME" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ARCH=$(cat $CONFIG_ENV | grep -w "ARCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "EXTRA_CMDS=$(cat $CONFIG_ENV | grep -w "EXTRA_CMDS" | head -n 1 | cut -d ":" -f 2)" >> $GITHUB_ENV
        echo "USE_CUSTOM_CLANG=$(cat $CONFIG_ENV | grep -w "USE_CUSTOM_CLANG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CUSTOM_CLANG_SOURCE=$(cat $CONFIG_ENV | grep -w "CUSTOM_CLANG_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CUSTOM_CLANG_BRANCH=$(cat $CONFIG_ENV | grep -w "CUSTOM_CLANG_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CUSTOM_CMDS=$(cat $CONFIG_ENV | grep -w "CUSTOM_CMDS" | head -n 1 | cut -d ":" -f 2)" >> $GITHUB_ENV
        echo "CLANG_BRANCH=$(cat $CONFIG_ENV | grep -w "CLANG_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CLANG_VERSION=$(cat $CONFIG_ENV | grep -w "CLANG_VERSION" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_GCC_ARM64=$(cat $CONFIG_ENV | grep -w "ENABLE_GCC_ARM64" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_GCC_ARM32=$(cat $CONFIG_ENV | grep -w "ENABLE_GCC_ARM32" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "USE_CUSTOM_GCC_64=$(cat $CONFIG_ENV | grep -w "USE_CUSTOM_GCC_64" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CUSTOM_GCC_64_SOURCE=$(cat $CONFIG_ENV | grep -w "CUSTOM_GCC_64_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CUSTOM_GCC_64_BRANCH=$(cat $CONFIG_ENV | grep -w "CUSTOM_GCC_64_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "USE_CUSTOM_GCC_32=$(cat $CONFIG_ENV | grep -w "USE_CUSTOM_GCC_32" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CUSTOM_GCC_32_SOURCE=$(cat $CONFIG_ENV | grep -w "CUSTOM_GCC_32_SOURCE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "CUSTOM_GCC_32_BRANCH=$(cat $CONFIG_ENV | grep -w "CUSTOM_GCC_32_BRANCH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_KERNELSU=$(cat $CONFIG_ENV | grep -w "ENABLE_KERNELSU" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KERNELSU_TAG=$(cat $CONFIG_ENV | grep -w "KERNELSU_TAG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ADD_KPROBES_CONFIG=$(cat $CONFIG_ENV | grep -w "ADD_KPROBES_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "DISABLE-LTO=$(cat $CONFIG_ENV | grep -w "DISABLE-LTO" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ADD_OVERLAYFS_CONFIG=$(cat $CONFIG_ENV | grep -w "ADD_OVERLAYFS_CONFIG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "DISABLE_CC_WERROR=$(cat $CONFIG_ENV | grep -w "DISABLE_CC_WERROR" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "ENABLE_CCACHE=$(cat $CONFIG_ENV | grep -w "ENABLE_CCACHE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "NEED_DTBO=$(cat $CONFIG_ENV | grep -w "NEED_DTBO" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "BUILD_BOOT_IMG=$(cat $CONFIG_ENV | grep -w "BUILD_BOOT_IMG" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "SOURCE_BOOT_IMAGE=$(cat $CONFIG_ENV | grep -w "SOURCE_BOOT_IMAGE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KSU_EXPECTED_SIZE=$(cat $CONFIG_ENV | grep -w "KSU_EXPECTED_SIZE" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV
        echo "KSU_EXPECTED_HASH=$(cat $CONFIG_ENV | grep -w "KSU_EXPECTED_HASH" | head -n 1 | cut -d "=" -f 2)" >> $GITHUB_ENV

    - name: Set swap to 10G
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 10

    - name: Setup build kernel environment
      run: |
        echo "BUILD_TIME=$(TZ=Asia/Shanghai date "+%Y%m%d%H%M")" >> $GITHUB_ENV
        echo "DEVICE=$(echo ${{ env.KERNEL_CONFIG }} | sed 's!vendor/!!;s/_defconfig//;s/_user//;s/-perf//')" >> $GITHUB_ENV
        sudo apt-get update
        sudo apt-get install -y git ccache automake flex lzop bison gperf build-essential zip curl zlib1g-dev g++-multilib libxml2-utils bzip2 libbz2-dev libbz2-1.0 libghc-bzlib-dev squashfs-tools pngcrush schedtool dpkg-dev liblz4-tool make optipng maven libssl-dev pwgen libswitch-perl policycoreutils minicom libxml-sax-base-perl libxml-simple-perl bc libc6-dev-i386 libx11-dev libgl1-mesa-dev xsltproc unzip device-tree-compiler python3 libncurses-dev binutils-aarch64-linux-gnu binutils-arm-linux-gnueabi
        mkdir -p $GITHUB_WORKSPACE/kernel_workspace

    - name: Download Clang-aosp
      if: env.USE_CUSTOM_CLANG != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        
        if [[ "${{ env.CLANG_BRANCH }}" == *"kernel-build"* ]]; then
          echo "检测到 Kernel Build 分支,使用 kernel/prebuilts/build-tools 仓库..."
          git clone https://android.googlesource.com/kernel/prebuilts/build-tools -b ${{ env.CLANG_BRANCH }} kernel-build-tools --depth=1
          
          echo "=== 检查下载的目录结构 ==="
          ls -la kernel-build-tools/
          echo "=========================="
          
          # kernel-build-tools 包含多个工具,需要分别提取
          mkdir -p clang-aosp/bin
          
          # 复制构建工具 (linux-x86/bin)
          if [ -d "kernel-build-tools/linux-x86/bin" ]; then
            echo "复制构建工具..."
            cp -r kernel-build-tools/linux-x86/bin/* clang-aosp/bin/
          fi
          
          # 查找并复制 LLVM 工具链
          if [ -d "kernel-build-tools/build-tools" ]; then
            echo "从 build-tools 查找 LLVM..."
            find kernel-build-tools/build-tools -type d -name "linux-x86" | head -1 | while read llvm_dir; do
              if [ -d "$llvm_dir/bin" ]; then
                cp -r "$llvm_dir/bin"/* clang-aosp/bin/
              fi
            done
          fi
          
          # 检查是否有独立的 clang 目录
          for clang_dir in kernel-build-tools/prebuilts-master/clang/host/linux-x86/clang-* kernel-build-tools/clang-*; do
            if [ -d "$clang_dir/bin" ] && [ -f "$clang_dir/bin/clang" ]; then
              echo "找到 Clang: $clang_dir"
              cp -r "$clang_dir/bin"/* clang-aosp/bin/
              break
            fi
          done
          
          # 验证是否成功获取 clang
          if [ ! -f "clang-aosp/bin/clang" ]; then
            echo "错误: 未找到 clang 编译器"
            echo "尝试查找 clang 位置:"
            find kernel-build-tools -name "clang" -type f 2>/dev/null | head -10
            echo "改用标准 AOSP Clang..."
            rm -rf clang-aosp
            wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-${{ env.CLANG_VERSION }}.tar.gz -O clang.tar.gz
            mkdir -p clang-aosp
            tar -C clang-aosp/ -zxf clang.tar.gz
          fi
          
        else
          echo "使用标准 AOSP Prebuilts Clang 仓库..."
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-${{ env.CLANG_VERSION }}.tar.gz -O clang.tar.gz || \
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/aosp-master/clang-${{ env.CLANG_VERSION }}.tar.gz -O clang.tar.gz
          
          mkdir -p clang-aosp
          tar -C clang-aosp/ -zxf clang.tar.gz
          
          if [ -d "clang-aosp/clang-${{ env.CLANG_VERSION }}" ]; then
            mv clang-aosp/clang-${{ env.CLANG_VERSION }}/* clang-aosp/
            rm -rf clang-aosp/clang-${{ env.CLANG_VERSION }}
          fi
        fi
        
        chmod -R +x clang-aosp/bin 2>/dev/null || true
        
        # 最终验证
        echo "=== 验证 Clang 安装 ==="
        if [ -f "clang-aosp/bin/clang" ]; then
          echo "✓ Clang 安装成功"
          clang-aosp/bin/clang --version | head -3
        else
          echo "✗ Clang 安装失败"
          exit 1
        fi

    - name: Download Custom-Clang
      if: env.USE_CUSTOM_CLANG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [[ ${{ env.CUSTOM_CLANG_SOURCE }} =~ git ]]; then
            if [[ ${{ env.CUSTOM_CLANG_SOURCE }} == *'.tar.gz' ]]; then
                wget -O clang.tar.gz ${{ env.CUSTOM_CLANG_SOURCE }}
                mkdir clang-aosp
                tar -C clang-aosp/ -zxvf clang.tar.gz
            else
                git clone ${{ env.CUSTOM_CLANG_SOURCE }} -b ${{ env.CUSTOM_CLANG_BRANCH }} clang-aosp --depth=1
            fi        
        else
            wget -O clang.zip ${{ env.CUSTOM_CLANG_SOURCE }}
            mkdir clang-aosp
            unzip clang.zip -d clang-aosp/
        fi

    - name: Download Gcc-aosp
      if: env.USE_CUSTOM_GCC_64 != 'true' || env.USE_CUSTOM_GCC_32 != 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ ${{ env.ENABLE_GCC_ARM64 }} = true ]; then
            mkdir gcc-64
            wget -O gcc-aarch64.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz
            tar -C gcc-64/ -zxvf gcc-aarch64.tar.gz
            echo "GCC_64_PATH=$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin/aarch64-linux-android-" >> $GITHUB_ENV
        fi

        if [ ${{ env.ENABLE_GCC_ARM32 }} = true ]; then
            mkdir gcc-32
            wget -O gcc-arm.tar.gz https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/tags/android-12.1.0_r27.tar.gz
            tar -C gcc-32/ -zxvf gcc-arm.tar.gz
            echo "GCC_32_PATH=$GITHUB_WORKSPACE/kernel_workspace/gcc-32/bin/arm-linux-androideabi-" >> $GITHUB_ENV
        fi

    - name: Download Custom-Gcc
      if: env.USE_CUSTOM_GCC_64 == 'true' || env.USE_CUSTOM_GCC_32 == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        if [ ${{ env.USE_CUSTOM_GCC_64 }} = true ]; then
          if [[ ${{ env.CUSTOM_GCC_64_SOURCE }} =~ git ]]; then
              if [[ ${{ env.CUSTOM_GCC_64_SOURCE }} == *'.tar.gz' ]]; then
                wget -O gcc-64.tar.gz ${{ env.CUSTOM_GCC_64_SOURCE }}
                mkdir gcc-64
                tar -C gcc-64/ -zxvf gcc-64.tar.gz
              else
                git clone ${{ env.CUSTOM_GCC_64_SOURCE }} -b ${{ env.CUSTOM_GCC_64_BRANCH }} gcc-64 --depth=1
              fi
          else
              wget -O gcc-64.zip ${{ env.CUSTOM_GCC_64_SOURCE }}
              mkdir gcc-64
              unzip gcc-64.zip -d gcc-64/
          fi
          PREFIX=$(ls gcc-64/bin/ | grep gcc | head -1 | sed 's/gcc$//')
          echo "GCC_64_PATH=$GITHUB_WORKSPACE/kernel_workspace/gcc-64/bin/$PREFIX" >> $GITHUB_ENV
        fi

        if [ ${{ env.USE_CUSTOM_GCC_32 }} = true ]; then
          if [[ ${{ env.CUSTOM_GCC_32_SOURCE }} =~ git ]]; then
              if [[ ${{ env.CUSTOM_GCC_32_SOURCE }} == *'.tar.gz' ]]; then
                wget -O gcc-32.tar.gz ${{ env.CUSTOM_GCC_32_SOURCE }}
                mkdir gcc-32
                tar -C gcc-32/ -zxvf gcc-32.tar.gz
              else
                git clone ${{ env.CUSTOM_GCC_32_SOURCE }} -b ${{ env.CUSTOM_GCC_32_BRANCH }} gcc-32 --depth=1
              fi
          else
            wget -O gcc-32.zip ${{ env.CUSTOM_GCC_32_SOURCE }}
            mkdir gcc-32
            unzip gcc-32.zip -d gcc-32/
          fi
          PREFIX=$(ls gcc-32/bin/ | grep gcc | head -1 | sed 's/gcc$//')
          echo "GCC_32_PATH=$GITHUB_WORKSPACE/kernel_workspace/gcc-32/bin/$PREFIX" >> $GITHUB_ENV
        fi

    - name: Download mkbootimg tools
      if: env.BUILD_BOOT_IMG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://android.googlesource.com/platform/system/tools/mkbootimg tools -b master-kernel-build-2022 --depth=1

    - name: Download kernel source
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone ${{ env.KERNEL_SOURCE }} -b ${{ env.KERNEL_SOURCE_BRANCH }} android-kernel --depth=1

    - name: Download source boot image
      if: env.BUILD_BOOT_IMG == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        wget -O boot-source.img ${{ env.SOURCE_BOOT_IMAGE }}
        if [ -f boot-source.img ]; then
            echo "FORMAT_MKBOOTING=$(echo `tools/unpack_bootimg.py --boot_img=boot-source.img --format mkbootimg`)" >> $GITHUB_ENV
            echo "HAVE_SOURCE_BOOT_IMAGE=true" >> $GITHUB_ENV
        fi
  
    - name: Setup KernelSU
      if: env.ENABLE_KERNELSU == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        curl -LSs "https://raw.githubusercontent.com/SukiSU-Ultra/SukiSU-Ultra/main/kernel/setup.sh" | bash -s ${{ env.KERNELSU_TAG }}
        
        echo "修补 KernelSU 以兼容老内核..."
        
        # 修复 MODULE_IMPORT_NS 问题
        if [ -f "drivers/kernelsu/ksu.c" ]; then
          echo "修复 ksu.c..."
          sed -i '/MODULE_IMPORT_NS/d' drivers/kernelsu/ksu.c
        fi
        
        # 修复 allowlist.c 的兼容性问题
        if [ -f "drivers/kernelsu/allowlist.c" ]; then
          echo "修复 allowlist.c..."
          # 添加缺失的头文件
          sed -i '1i#include <linux/sched/task.h>' drivers/kernelsu/allowlist.c
          
          # 替换 TWA_RESUME 为老内核兼容的值 (true)
          sed -i 's/TWA_RESUME/true/g' drivers/kernelsu/allowlist.c
        fi
        
        # 修复 app_profile.c 的兼容性问题
        if [ -f "drivers/kernelsu/app_profile.c" ]; then
          echo "修复 app_profile.c..."
          # 注释掉 filter_count 相关代码(老内核不支持)
          sed -i 's/.*seccomp\.filter_count.*/\/\/ &  \/\/ Disabled for old kernel/g' drivers/kernelsu/app_profile.c
        fi
        
        # 修复 sucompat.c 的兼容性问题
        if [ -f "drivers/kernelsu/sucompat.c" ]; then
          echo "修复 sucompat.c..."
          # 替换新内核的 pgtable.h 为老内核的头文件
          sed -i 's/#include <linux\/pgtable.h>/#include <asm\/pgtable.h>/g' drivers/kernelsu/sucompat.c
          
          # 替换 strncpy_from_user_nofault 为老内核的 strncpy_from_user
          sed -i 's/strncpy_from_user_nofault/strncpy_from_user/g' drivers/kernelsu/sucompat.c
        fi
        
        # 修复 syscall_hook_manager.c 的兼容性问题
        if [ -f "drivers/kernelsu/syscall_hook_manager.c" ]; then
          echo "修复 syscall_hook_manager.c..."
          # 替换 strncpy_from_user_nofault 为老内核的 strncpy_from_user
          sed -i 's/strncpy_from_user_nofault/strncpy_from_user/g' drivers/kernelsu/syscall_hook_manager.c
          # __NR_clone3 在 4.19 内核中不存在(5.3 才引入),注释掉相关代码
          sed -i 's/case __NR_clone3:/\/\/ case __NR_clone3: \/\/ Disabled for old kernel/g' drivers/kernelsu/syscall_hook_manager.c
          sed -i 's/if (id == __NR_clone || id == __NR_clone3)/if (id == __NR_clone \/* || id == __NR_clone3 *\/)/g' drivers/kernelsu/syscall_hook_manager.c
        fi
        
        # 修复 setuid_hook.c 的兼容性问题
        if [ -f "drivers/kernelsu/setuid_hook.c" ]; then
          echo "修复 setuid_hook.c..."
          # 替换 TWA_RESUME 为老内核兼容的值 (true)
          sed -i 's/TWA_RESUME/true/g' drivers/kernelsu/setuid_hook.c
          # 注释掉 ksu_seccomp_allow_cache 调用(seccomp_cache 在老内核中不支持)
          sed -i 's/.*ksu_seccomp_allow_cache.*/\/\/ &  \/\/ Disabled for old kernel/g' drivers/kernelsu/setuid_hook.c
        fi
        
        # 修复 kernel_umount.c 的兼容性问题
        if [ -f "drivers/kernelsu/kernel_umount.c" ]; then
          echo "修复 kernel_umount.c..."
          # 替换 TWA_RESUME 为老内核兼容的值 (true)
          sed -i 's/TWA_RESUME/true/g' drivers/kernelsu/kernel_umount.c
        fi
        
        # 修复 supercalls.c 的兼容性问题
        if [ -f "drivers/kernelsu/supercalls.c" ]; then
          echo "修复 supercalls.c..."
          # 替换 TWA_RESUME 为老内核兼容的值 (true)
          sed -i 's/TWA_RESUME/true/g' drivers/kernelsu/supercalls.c
        fi
        
        # 修复 su_mount_ns.c 的兼容性问题
        if [ -f "drivers/kernelsu/su_mount_ns.c" ]; then
          echo "修复 su_mount_ns.c..."
          # 替换 uapi/linux/mount.h 为老内核的头文件路径
          sed -i 's/#include <uapi\/linux\/mount.h>/#include <linux\/mount.h>/g' drivers/kernelsu/su_mount_ns.c
          # 替换 TWA_RESUME 为老内核兼容的值 (true)
          sed -i 's/TWA_RESUME/true/g' drivers/kernelsu/su_mount_ns.c
        fi
        
        # 修复 ksud.c 的兼容性问题
        if [ -f "drivers/kernelsu/ksud.c" ]; then
          echo "修复 ksud.c..."
          # 替换 strncpy_from_user_nofault 为老内核的 strncpy_from_user
          sed -i 's/strncpy_from_user_nofault/strncpy_from_user/g' drivers/kernelsu/ksud.c
          # 替换 copy_from_user_nofault 为老内核的 copy_from_user
          sed -i 's/copy_from_user_nofault/copy_from_user/g' drivers/kernelsu/ksud.c
          # 替换 copy_to_user_nofault 为老内核的 copy_to_user
          sed -i 's/copy_to_user_nofault/copy_to_user/g' drivers/kernelsu/ksud.c
          # 替换 TWA_RESUME 为老内核兼容的值 (true)
          sed -i 's/TWA_RESUME/true/g' drivers/kernelsu/ksud.c
        fi
        
        # 修复 seccomp_cache.c 的兼容性问题
        if [ -f "drivers/kernelsu/seccomp_cache.c" ]; then
          echo "修复 seccomp_cache.c..."
          # 在文件开头添加 SECCOMP_ARCH_NATIVE_NR 的定义
          sed -i '1i#ifndef SECCOMP_ARCH_NATIVE_NR\n#ifdef CONFIG_ARM64\n#define SECCOMP_ARCH_NATIVE_NR NR_syscalls\n#else\n#define SECCOMP_ARCH_NATIVE_NR __NR_syscalls\n#endif\n#endif' drivers/kernelsu/seccomp_cache.c
        fi
        
        # 修复 util.c 的兼容性问题
        if [ -f "drivers/kernelsu/util.c" ]; then
          echo "修复 util.c..."
          # 替换新内核的 pgtable.h 为老内核的头文件
          sed -i 's/#include <linux\/pgtable.h>/#include <asm\/pgtable.h>/g' drivers/kernelsu/util.c
          # 替换新内核的 mmap_read_trylock 为老内核的 down_read_trylock
          sed -i 's/mmap_read_trylock(mm)/down_read_trylock(\&mm->mmap_sem)/g' drivers/kernelsu/util.c
          # 替换新内核的 mmap_read_unlock 为老内核的 up_read
          sed -i 's/mmap_read_unlock(mm)/up_read(\&mm->mmap_sem)/g' drivers/kernelsu/util.c
        fi
        
        # 修复 file_wrapper.c 的兼容性问题
        if [ -f "drivers/kernelsu/file_wrapper.c" ]; then
          echo "修复 file_wrapper.c..."
          # 注释掉 iopoll 相关代码(老内核不支持)
          sed -i 's/return orig->f_op->iopoll(kiocb, spin);/\/\/ return orig->f_op->iopoll(kiocb, spin); \/\/ Disabled for old kernel\n\treturn -EOPNOTSUPP;/g' drivers/kernelsu/file_wrapper.c
          sed -i 's/p->ops\.iopoll = fp->f_op->iopoll ? ksu_wrapper_iopoll : NULL;/\/\/ p->ops.iopoll = fp->f_op->iopoll ? ksu_wrapper_iopoll : NULL; \/\/ Disabled for old kernel/g' drivers/kernelsu/file_wrapper.c
          # 注释掉 remap_file_range 相关代码(老内核使用 dedupe_file_range)
          sed -i 's/if (remap_flags & REMAP_FILE_DEDUP) {/\/\/ if (remap_flags \& REMAP_FILE_DEDUP) { \/\/ Disabled for old kernel\n\tif (0) {/g' drivers/kernelsu/file_wrapper.c
          # 注释掉包含 remap_file_range 的多行调用
          sed -i '/orig->f_op->remap_file_range/s/^/\/\/ /' drivers/kernelsu/file_wrapper.c
          sed -i '/remap_flags);$/s/^/\/\/ /' drivers/kernelsu/file_wrapper.c
          # 在注释后的行之前插入返回语句
          sed -i '/\/\/ .*orig->f_op->remap_file_range/i\        return -EOPNOTSUPP; \/\/ Disabled for old kernel' drivers/kernelsu/file_wrapper.c
          sed -i 's/p->ops\.remap_file_range =/\/\/ p->ops.remap_file_range = \/\/ Disabled for old kernel/g' drivers/kernelsu/file_wrapper.c
          sed -i 's/fp->f_op->remap_file_range ? ksu_wrapper_remap_file_range : NULL;/\/\/ fp->f_op->remap_file_range ? ksu_wrapper_remap_file_range : NULL; \/\/ Disabled for old kernel/g' drivers/kernelsu/file_wrapper.c
          # 替换 security_inode_init_security_anon 为老内核的函数(带正确参数)
          sed -i 's/security_inode_init_security_anon/security_inode_init_security/g' drivers/kernelsu/file_wrapper.c
          sed -i 's/security_inode_init_security(inode, &qname, context_inode)/security_inode_init_security(inode, (struct inode *)context_inode, \&qname, NULL, NULL)/g' drivers/kernelsu/file_wrapper.c
          # 注释掉 selinux_inode 调用(老内核不支持)
          sed -i 's/struct inode_security_struct \*wrapper_sec = selinux_inode(wrapper_inode);/\/\/ struct inode_security_struct \*wrapper_sec = selinux_inode(wrapper_inode); \/\/ Disabled for old kernel\n\tstruct inode_security_struct \*wrapper_sec = NULL;/g' drivers/kernelsu/file_wrapper.c
        fi
        
        # 修复 pkg_observer.c 的兼容性问题
        if [ -f "drivers/kernelsu/pkg_observer.c" ]; then
          echo "修复 pkg_observer.c..."
          # 找到最后一个 #include 行号,在其后插入前向声明和适配器函数
          LAST_INCLUDE=$(grep -n "^#include" drivers/kernelsu/pkg_observer.c | tail -1 | cut -d: -f1)
          if [ -n "$LAST_INCLUDE" ]; then
            # 在最后一个 include 后插入前向声明和适配器函数
            sed -i "${LAST_INCLUDE}a\\\\n/* Forward declaration */\\nstatic int ksu_handle_inode_event(struct fsnotify_mark *mark, u32 mask, struct inode *inode, struct inode *dir, const struct qstr *name, u32 cookie);\\n\\n/* Compatibility wrapper for old kernel */\\nstatic int ksu_handle_event_compat(struct fsnotify_group *group, struct inode *inode, u32 mask, const void *data, int data_type, const unsigned char *file_name, u32 cookie, struct fsnotify_iter_info *iter_info) { return ksu_handle_inode_event(NULL, mask, inode, NULL, NULL, 0); }" drivers/kernelsu/pkg_observer.c
          fi
          # 替换字段名和函数名
          sed -i 's/\.handle_inode_event = ksu_handle_inode_event,/\.handle_event = ksu_handle_event_compat,/g' drivers/kernelsu/pkg_observer.c
          echo "pkg_observer.c 补丁完成"
        fi
        
        # 修复 selinux/selinux.c 的兼容性问题
        if [ -f "drivers/kernelsu/selinux/selinux.c" ]; then
          echo "修复 selinux/selinux.c..."
          # 替换新内核的 selinux_cred(cred) 为老内核的直接访问方式
          sed -i 's/selinux_cred(cred)/((struct task_security_struct *)cred->security)/g' drivers/kernelsu/selinux/selinux.c
        fi
        
        # 修复 selinux/sepolicy.c 的兼容性问题(禁用编译)
        if [ -f "drivers/kernelsu/selinux/sepolicy.c" ]; then
          echo "修复 selinux/sepolicy.c..."
          # 老内核的 SELinux 内部结构与新内核完全不同,直接禁用此文件编译
          sed -i '1s/^/#if 0 \/\/ Disabled for old kernel - SELinux internal structures incompatible\n/' drivers/kernelsu/selinux/sepolicy.c
          sed -i '$a#endif' drivers/kernelsu/selinux/sepolicy.c
        fi
        
        # 修复 selinux/rules.c 的兼容性问题(禁用编译)
        if [ -f "drivers/kernelsu/selinux/rules.c" ]; then
          echo "修复 selinux/rules.c..."
          # 老内核的 SELinux 结构(selinux_state.policy, policy_mutex 等)与新内核不同,禁用编译
          sed -i '1s/^/#if 0 \/\/ Disabled for old kernel - SELinux state structures incompatible\n/' drivers/kernelsu/selinux/rules.c
          sed -i '$a#endif' drivers/kernelsu/selinux/rules.c
        fi
        
        # 修复 manual_su.c 的兼容性问题
        if [ -f "drivers/kernelsu/manual_su.c" ]; then
          echo "修复 manual_su.c..."
          # 添加 random.h 头文件(老内核需要显式包含)
          sed -i '1i#include <linux/random.h>' drivers/kernelsu/manual_su.c
        fi
        
        # 全局补丁：处理所有 KernelSU 文件中的常见兼容性问题
        echo "应用全局兼容性补丁..."
        find drivers/kernelsu -type f -name "*.c" -exec sed -i 's/.*ksu_seccomp_allow_cache.*/\/\/ &  \/\/ Disabled for old kernel/g' {} \;
        find drivers/kernelsu -type f -name "*.c" -exec sed -i 's/.*seccomp\.filter_count.*/\/\/ &  \/\/ Disabled for old kernel/g' {} \;
        find drivers/kernelsu -type f -name "*.c" -exec sed -i 's/__NR_clone3/__NR_clone3_DISABLED/g' {} \;
        
        echo "KernelSU 补丁应用完成"
        
        # 修复一加内核源码的 -Werror 问题
        echo "移除一加内核 Makefile 中的 -Werror 标志..."
        find drivers/oneplus -name "Makefile" -exec sed -i 's/-Werror//g' {} \; 2>/dev/null || true
        find drivers/oneplus -name "Kbuild" -exec sed -i 's/-Werror//g' {} \; 2>/dev/null || true
        
        echo "UPLOADNAME=-KernelSU" >> $GITHUB_ENV

    - name: Setup Configuration for Kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        if [ ${{ env.ADD_KPROBES_CONFIG }} = true ]; then
            echo "CONFIG_MODULES=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            echo "CONFIG_KPROBES=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            echo "CONFIG_HAVE_KPROBES=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            echo "CONFIG_KPROBE_EVENTS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        fi
        if [ ${{ env.ADD_OVERLAYFS_CONFIG }} = true ]; then
            echo "CONFIG_OVERLAY_FS=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        fi
        if [ ${{ env.DISABLE-LTO }} = true ]; then
            sed -i 's/CONFIG_LTO=y/CONFIG_LTO=n/' arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            sed -i 's/CONFIG_LTO_CLANG=y/CONFIG_LTO_CLANG=n/' arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            sed -i 's/CONFIG_THINLTO=y/CONFIG_THINLTO=n/' arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
            echo "CONFIG_LTO_NONE=y" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        fi
        if [ ${{ env.DISABLE_CC_WERROR }} = true ]; then
            echo "CONFIG_CC_WERROR=n" >> arch/${{ env.ARCH }}/configs/${{ env.KERNEL_CONFIG }}
        fi

    - name: Setup ccache
      if: env.ENABLE_CCACHE == 'true'
      uses: hendrikmuhs/ccache-action@v1.2
      with:
        key: build-kernel-${{ env.DEVICE }}${{ env.UPLOADNAME }}
        max-size: 2G

    - name: Build kernel
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel
        
        CLANG_BIN=$GITHUB_WORKSPACE/kernel_workspace/clang-aosp/bin
        export PATH=$CLANG_BIN:$PATH
        
        # 检查 Clang 工具链
        echo "=== 检查 Clang 工具链 ==="
        ls -lh $CLANG_BIN/ | head -20
        echo "===================="
        
        cd $CLANG_BIN
        
        # 检查并创建 ld.lld 符号链接
        USE_LLD=true
        if [ ! -f ld.lld ]; then
            if [ -f lld ]; then
                ln -sf lld ld.lld
                echo "✓ 已创建符号链接: lld -> ld.lld"
            elif [ -f ld.lld-12 ]; then
                ln -sf ld.lld-12 ld.lld
                echo "✓ 已创建符号链接: ld.lld-12 -> ld.lld"
            elif [ -f ld64.lld ]; then
                ln -sf ld64.lld ld.lld
                echo "✓ 已创建符号链接: ld64.lld -> ld.lld"
            else
                echo "⚠ 警告: Clang 工具链中未找到 lld"
                echo "尝试在父目录查找..."
                if [ -f ../lld ] || [ -f ../bin/lld ]; then
                    find .. -name "lld" -o -name "ld.lld*" -o -name "ld64.lld" 2>/dev/null | head -5
                fi
                USE_LLD=false
            fi
        else
            echo "✓ ld.lld 已存在"
        fi
        
        # 确保 llvm-ar 存在
        if [ ! -f llvm-ar ]; then
            for ar in llvm-ar-*; do
                if [ -f "$ar" ]; then
                    ln -sf "$ar" llvm-ar
                    echo "✓ 已创建符号链接: $ar -> llvm-ar"
                    break
                fi
            done
        fi
        
        # 验证关键工具
        echo "=== 验证工具链 ==="
        echo "PATH=$PATH"
        which clang && clang --version | head -1
        if [ "$USE_LLD" = true ]; then
            which ld.lld && ld.lld --version | head -1
        else
            which ld && ld --version | head -1
        fi
        echo "=================="
        
        # 返回内核源码目录
        cd $GITHUB_WORKSPACE/kernel_workspace/android-kernel

        export KBUILD_BUILD_HOST=Github-Action
        export KBUILD_BUILD_USER=$(echo ${{ github.actor }} | tr A-Z a-z)
        
        # 修复 dtc 等 host 工具的 yylloc 重复定义问题
        export HOSTCFLAGS="-fcommon"
        export HOSTLDFLAGS="-fcommon"
        
        if [ ! -z ${{ env.KSU_EXPECTED_SIZE }} ] && [ ! -z ${{ env.KSU_EXPECTED_HASH }} ]; then
          export KSU_EXPECTED_SIZE=${{ env.KSU_EXPECTED_SIZE }}
          export KSU_EXPECTED_HASH=${{ env.KSU_EXPECTED_HASH }}
        fi
        
        # --- 设置 CLANG_TRIPLE 和 CROSS_COMPILE ---
        case "${{ env.ARCH }}" in
          arm64) CLANG_TRIPLE="aarch64-linux-gnu-" ;;
          arm)   CLANG_TRIPLE="arm-linux-gnueabi-" ;;
          x86_64) CLANG_TRIPLE="x86_64-linux-gnu-" ;;
          i386)  CLANG_TRIPLE="i386-linux-gnu-" ;;
          *)     CLANG_TRIPLE="${{ env.ARCH }}-linux-gnu-" ;;
        esac
        export CLANG_TRIPLE

        # 设置 CROSS_COMPILE
        if [ ! -z "${{ env.GCC_64_PATH }}" ]; then
            echo "使用自定义 GCC: ${{ env.GCC_64_PATH }}"
            export CROSS_COMPILE="${{ env.GCC_64_PATH }}"
        else
            echo "使用系统工具链作为 CROSS_COMPILE"
            if [ "${{ env.ARCH }}" = "arm64" ]; then
                export CROSS_COMPILE=aarch64-linux-gnu-
            elif [ "${{ env.ARCH }}" = "arm" ]; then
                export CROSS_COMPILE=arm-linux-gnueabi-
            fi
        fi
        
        if [ ! -z "${{ env.GCC_32_PATH }}" ]; then
            export CROSS_COMPILE_ARM32="${{ env.GCC_32_PATH }}"
        fi

        echo "Final CC: clang"
        echo "Final CROSS_COMPILE: $CROSS_COMPILE"
        echo "Final CLANG_TRIPLE: $CLANG_TRIPLE"
        echo "Final LD: ld.lld (from PATH)"
        
        # 生成配置
        make -j$(nproc --all) CC=clang O=out ARCH=${{ env.ARCH }} CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }} ${{ env.KERNEL_CONFIG }}
        
        # 强制禁用 CC_WERROR（防止 defconfig 覆盖）
        if [ ${{ env.DISABLE_CC_WERROR }} = true ]; then
            echo "禁用编译器 -Werror 标志..."
            sed -i 's/CONFIG_CC_WERROR=y/# CONFIG_CC_WERROR is not set/' out/.config
            
            # 移除所有子目录 Makefile 中的 -Werror 标志
            echo "移除子目录 Makefile 中的 -Werror..."
            find drivers/oneplus -type f \( -name "Makefile" -o -name "Kbuild" \) -exec sed -i 's/-Werror//g' {} \; 2>/dev/null || true
            find drivers -type f -name "Makefile" -exec sed -i 's/subdir-ccflags-y.*-Werror/# &/g' {} \; 2>/dev/null || true
            
            # 导出环境变量强制禁用 -Werror
            export KCFLAGS="-Wno-error"
            export KBUILD_CFLAGS_KERNEL="-Wno-error"
            export KBUILD_CFLAGS_MODULE="-Wno-error"
        fi
        
        # 编译内核
        if [ ${{ env.ENABLE_CCACHE }} = true ]; then
            make -j$(nproc --all) CC="ccache clang" O=out ARCH=${{ env.ARCH }} CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="-Wno-error" ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }}
        else
            make -j$(nproc --all) CC=clang O=out ARCH=${{ env.ARCH }} CLANG_TRIPLE=$CLANG_TRIPLE CROSS_COMPILE=$CROSS_COMPILE KCFLAGS="-Wno-error" ${{ env.CUSTOM_CMDS }} ${{ env.EXTRA_CMDS }}
        fi

    - name: Check a kernel output files
      run: |
       cd $GITHUB_WORKSPACE/kernel_workspace
       if [ -f android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} ]; then
           echo "CHECK_FILE_IS_OK=true" >> $GITHUB_ENV
       else
           echo "Kernel output file is empty"
           exit 1
       fi
       if [ ${{ env.NEED_DTBO }} = true ]; then
           if [ -f android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img ]; then
               echo "CHECK_DTBO_IS_OK=true" >> $GITHUB_ENV
           else
               echo "DTBO image is empty"
               exit 1
           fi
       fi
  
    - name: Make Anykernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        git clone https://github.com/osm0sis/AnyKernel3
        sed -i 's/do.devicecheck=1/do.devicecheck=0/g' AnyKernel3/anykernel.sh
        sed -i 's!block=/dev/block/platform/omap/omap_hsmmc.0/by-name/boot;!block=auto;!g' AnyKernel3/anykernel.sh
        sed -i 's/is_slot_device=0;/is_slot_device=auto;/g' AnyKernel3/anykernel.sh
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} AnyKernel3/
        if [ ${{ env.CHECK_DTBO_IS_OK }} = true ]; then
            cp android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img AnyKernel3/
        fi
        rm -rf AnyKernel3/.git* AnyKernel3/README.md

    - name: Make boot image
      if: env.HAVE_SOURCE_BOOT_IMAGE == 'true' && env.CHECK_FILE_IS_OK == 'true'
      run: |
        cd $GITHUB_WORKSPACE/kernel_workspace
        tools/unpack_bootimg.py --boot_img boot-source.img
        cp android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }} out/kernel
        tools/mkbootimg.py ${{ env.FORMAT_MKBOOTING }} -o boot.img
        if [ -f boot.img ]; then
            echo "MAKE_BOOT_IMAGE_IS_OK=true" >> $GITHUB_ENV
        else
            echo "Boot image is empty"
            exit 1
        fi
    
    - name: Upload ${{ env.KERNEL_IMAGE_NAME }}
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.KERNEL_IMAGE_NAME }}${{ env.UPLOADNAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/${{ env.KERNEL_IMAGE_NAME }}

    - name: Upload AnyKernel3
      if: env.CHECK_FILE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: AnyKernel3${{ env.UPLOADNAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/AnyKernel3/*

    - name: Upload DTBO image
      if: env.CHECK_DTBO_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: dtbo-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/android-kernel/out/arch/${{ env.ARCH }}/boot/dtbo.img

    - name: Upload boot image
      if: env.MAKE_BOOT_IMAGE_IS_OK == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: boot${{ env.UPLOADNAME }}-${{ env.DEVICE }}-${{ env.BUILD_TIME }}
        path: kernel_workspace/boot.img