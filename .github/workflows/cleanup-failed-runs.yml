name: Cleanup Failed Workflow Runs

on:
  workflow_dispatch:
    inputs:
      days_old:
        description: '删除多少天前的失败运行 (默认: 0 = 所有)'
        required: false
        default: '0'
      limit:
        description: '最多删除多少个运行 (默认: 100)'
        required: false
        default: '100'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete failed workflow runs
        uses: actions/github-script@v7
        with:
          script: |
            const daysOld = parseInt('${{ github.event.inputs.days_old }}') || 0;
            const limit = parseInt('${{ github.event.inputs.limit }}') || 100;
            
            const cutoffDate = new Date();
            if (daysOld > 0) {
              cutoffDate.setDate(cutoffDate.getDate() - daysOld);
            }
            
            console.log(`正在查找失败的 workflow runs...`);
            if (daysOld > 0) {
              console.log(`只删除 ${daysOld} 天前的运行`);
            }
            console.log(`最多删除 ${limit} 个运行`);
            
            const runs = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              status: 'failure',
              per_page: limit
            });
            
            let deleted = 0;
            for (const run of runs.data.workflow_runs) {
              const runDate = new Date(run.created_at);
              
              if (daysOld > 0 && runDate > cutoffDate) {
                console.log(`跳过运行 #${run.id} (${run.name}) - 太新了`);
                continue;
              }
              
              try {
                await github.rest.actions.deleteWorkflowRun({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  run_id: run.id
                });
                console.log(`✓ 已删除运行 #${run.id} (${run.name}) - ${run.created_at}`);
                deleted++;
              } catch (error) {
                console.log(`✗ 删除运行 #${run.id} 失败: ${error.message}`);
              }
            }
            
            console.log(`\n总共删除了 ${deleted} 个失败的 workflow runs`);
